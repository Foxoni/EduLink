name: Pipeline DevSecOps GCS2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1 : QUALITÉ DU CODE, DÉPENDANCES ET SECRETS ---
  sast_and_linting:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour bien scanner l'historique des secrets

      - name: 🕵️‍♂️ Recherche de secrets (TruffleHog / Gitleaks)
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Si ça trouve un secret, ça bloquera le pipeline, ce qui est le comportement voulu !

      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installation des outils Python
        run: |
          python -m pip install --upgrade pip
          pip install flake8 safety pip-audit

      - name: 🧹 Analyse statique (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🛡️ Audit des dépendances (Safety & pip-audit)
        run: |
          safety check || true
          pip-audit || true

  # --- JOB 2 : CONTENEURISATION ET SÉCURITÉ DOCKER ---
  build_docker_and_scan:
    needs: sast_and_linting
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🐳 Construction de l'image Docker (Test)
        run: docker build -t app-academie:latest .

      - name: 🔍 Scan de vulnérabilités Docker (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-academie:latest'
          format: 'table'
          exit-code: '0' # Mis à 0 pour afficher les alertes sans bloquer le pipeline au début
          ignore-unfixed: true
          vuln-type: 'os,library'

  # --- JOB 3 : TESTS DYNAMIQUES (DAST) AVEC OWASP ZAP ---
  dast_zap:
    needs: build_docker_and_scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🚀 Lancement de l'infrastructure de test (Base de données + Flask)
        run: |
          # On crée un faux fichier .env pour que Docker Compose puisse se lancer sur la machine GitHub
          echo "MYSQL_ROOT_PASSWORD=testroot" > .env
          echo "MYSQL_DATABASE=EduLink" >> .env
          echo "MYSQL_USER=testuser" >> .env
          echo "MYSQL_PASSWORD=testpass" >> .env
          echo "FLASK_SECRET_KEY=ci_secret_key_for_testing_only" >> .env

          # On lance le tout en arrière-plan
          docker compose up -d
          
          # On attend 15 secondes que MySQL et Flask soient bien démarrés
          sleep 15
          
          # On vérifie que le site répond bien
          curl -s -I http://localhost:5000 | grep "200 OK" || echo "Le serveur a démarré mais ne renvoie pas de code 200"

      - name: ⚡ Attaque automatisée (OWASP ZAP Baseline Scan)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          # Le rapport sera généré dans les artefacts GitHub