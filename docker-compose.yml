services:
  db:
    image: mysql:8.0
    container_name: gcs_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: EduLink
    ports:
      - "3306:3306"
    volumes:
      # L'initialisation automatique (très pratique)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # La sauvegarde réelle
      - ./mysql_data:/var/lib/mysql

  # --- PHPMYADMIN (Interface visuelle) ---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gcs_pma
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

  # --- APPLICATION FLASK (ADMIN) ---
  app:
    build: .
    container_name: gcs_flask_app
    restart: always
    ports:
      - "5001:5000"
    volumes:
      # Synchronise ton code local avec le conteneur (très utile pour le dev)
      - .:/app
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: EduLink
      MYSQL_USER: root
      MYSQL_PASSWORD: root_password
      FLASK_SECRET_KEY: edulink-dev-secret-key-change-en-prod
      FLASK_ENV: development
      FLASK_DEBUG: 1
    depends_on:
      - db