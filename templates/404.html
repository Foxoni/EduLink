<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLink — Page introuvable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .error-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .error-card {
            width: 100%;
            max-width: 460px;
            text-align: center;
        }
        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--blue-primary);
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        .error-code span { color: var(--accent); }
        .error-title {
            font-size: 1.3rem;
            color: var(--gray-dark);
            margin-bottom: 0.75rem;
        }
        .error-desc {
            color: var(--gray-medium);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .error-icon {
            width: 64px;
            height: 64px;
            background: var(--blue-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .error-icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--blue-primary);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="error-card card">
            <div class="error-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    <line x1="11" y1="8" x2="11" y2="11"/>
                    <line x1="11" y1="14" x2="11.01" y2="14"/>
                </svg>
            </div>
            <p class="error-code">4<span>0</span>4</p>
            <h1 class="error-title">Page introuvable</h1>
            <p class="error-desc">
                La page que vous cherchez n'existe pas ou a été déplacée.
            </p>
            <a href="{{ url_for('auth.login') }}" class="btn-primary" style="max-width: 220px; margin: 0 auto;">
                Retour à la connexion
            </a>
        </div>
    </div>
</body>
</html>
