<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLink — Connexion</title>

    <!-- Google Fonts : Poppins (titres) + Roboto (texte) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* ── Layout centré spécifique à la page login ── */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }

        /* ── En-tête logo ── */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .login-logo-icon {
            width: 44px;
            height: 44px;
            background-color: var(--blue-primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo-icon svg {
            width: 26px;
            height: 26px;
            stroke: var(--white);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .login-logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--blue-primary);
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--gray-medium);
        }

        /* ── Séparateur titre section ── */
        .login-title {
            font-size: 1.2rem;
            color: var(--gray-dark);
            margin-bottom: 1.5rem;
        }

        .login-title span {
            color: var(--accent);
        }

        /* ── Lien mot de passe oublié ── */
        .form-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--gray-medium);
        }

        /* ── Bande accent en bas de carte ── */
        .login-card-accent {
            height: 4px;
            background: linear-gradient(90deg, var(--blue-primary), var(--accent));
            border-radius: 0 0 var(--radius) var(--radius);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo -->
            <div class="login-header">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <!-- Icône outline : diplôme / chapeau de remise -->
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/>
                            <path d="M6 12v5c3.333 1.333 6.667 1.333 10 0v-5"/>
                        </svg>
                    </div>
                    <span class="login-logo-text">EduLink</span>
                </div>
                <p class="login-subtitle">Plateforme de gestion académique</p>
            </div>

            <!-- Carte connexion -->
            <div class="card">
                <h2 class="login-title">Connexion à votre <span>espace</span></h2>

                <!-- Message d'erreur -->
                {% if error %}
                <div class="alert-error" role="alert">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    {{ error }}
                </div>
                {% endif %}

                <!-- Formulaire -->
                <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="form-group">
                        <label for="compte">Identifiant</label>
                        <input type="text" id="compte" name="compte"
                               placeholder="ex : prof.martin"
                               autocomplete="username"
                               required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="mdp">Mot de passe</label>
                        <input type="password" id="mdp" name="mdp"
                               placeholder="••••••••"
                               autocomplete="current-password"
                               required>
                    </div>

                    <button type="submit" class="btn-primary">
                        <!-- Icône flèche -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        Se connecter
                    </button>
                </form>

                <p class="form-footer">
                    Problème de connexion ? Contactez votre administrateur.
                </p>
            </div>

            <!-- Bande de couleur décorative -->
            <div class="login-card-accent"></div>

        </div>
    </div>
</body>
</html>
