<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - EduLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0056b3 0%, #28a745 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .btn-primary { background: #0056b3; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
        .btn-primary:hover { background: #004494; }
        .logo { font-size: 2rem; font-weight: bold; color: #0056b3; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">EduLink 🎓</div>
        <h4 class="text-center mb-4">Portail Intranet</h4>
        
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Identifiant</label>
                <input type="text" name="username" class="form-control" placeholder="ex: admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
        
        <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">
            Contactez l'administration en cas d'oubli.
        </p>
    </div>

</body>
</html>
